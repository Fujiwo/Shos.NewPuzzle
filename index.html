<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Physical Ohajiki (MVP-α)</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="hud">
        <select id="mode-select">
            <option value="2end">2エンドモード</option>
            <option value="1end">1エンドモード</option>
        </select>
        <button id="mute-toggle">🔊 音 ON</button>
        <button id="restart">リスタート</button>
    </div>
    <div id="settings-root" class="hud"></div>
    <canvas id="game-canvas" width="600" height="600"></canvas>
    <p id="status" class="hud"></p>
    <script type="module">
        import { bootstrap } from './src/main.js';
        bootstrap({
            canvas: document.getElementById('game-canvas'),
            muteButton: document.getElementById('mute-toggle'),
            modeSelect: document.getElementById('mode-select'),
            statusEl: document.getElementById('status'),
            restartButton: document.getElementById('restart'),
            settingsRoot: document.getElementById('settings-root'),
        });
    </script>
</body>
</html>
